# AI Combat Match Runner Configuration

# 기본 매치 설정
default:
  rounds: 1
  scenario: "bt_vs_bt"
  max_steps: 0    # 0 = 자동(5분, runner_core에서 Hz 기반 동적 계산)
  verbose: true
  
# 사용 가능한 시나리오 목록
scenarios:
  - "bt_vs_bt"
  - "tail_chase"

# 시나리오별 설정
scenario_configs:
  bt_vs_bt:
    description: "행동트리 vs 행동트리 기본 대전"
    max_steps: 0    # 0 = 자동(5분)
  tail_chase:
    description: "미사일 회피 시나리오"
    max_steps: 0    # 0 = 자동(5분)

# 출력 설정
output:
  banner_width: 70
  show_replay_path: true
  show_round_summary: true
  
# 경로 설정
paths:
  replay_dir: "replays"
  submissions_dir: "submissions"
  examples_dir: "examples"

# 결과 형식 설정
result_format:
  show_steps: true
  show_duration: true
  show_rewards: true
