# aerobatic - 고급 3차원 기동 특화 예시
#
# 이 파일은 TimedAction 기반 장기 기동 노드 사용법을 보여줍니다.
#
# ── 장기 기동 사용 규칙 ─────────────────────────────────────────
#  - RUNNING을 반환하는 노드(Loop, ImmelmannTurn, SplitS, HammerHead)는
#    반드시 memory: true Sequence 안에 배치해야 합니다.
#  - memory: true가 없으면 매 tick 조건이 재평가되어 기동이 즉시 중단됩니다.
#
# ── 신규 노드 목록 ───────────────────────────────────────────────
#  [TimedAction] Loop / ImmelmannTurn / SplitS / HammerHead  → RUNNING → SUCCESS
#  [BaseAction]  SpiralDive / SpiralClimb / SliceTurn        → SUCCESS (단발)
# ─────────────────────────────────────────────────────────────────

name: aerobatic
version: "1.1"
description: "고급 3차원 기동 특화 — TimedAction 장기 기동 예시"

tree:
  type: Selector
  name: AerobaticRoot
  children:

  # ═══════════════════════════════════════════════════════════════
  # 1. CRITICAL: Hard Deck 회피 (최우선 — 패배 방지)
  # ═══════════════════════════════════════════════════════════════
  - type: Sequence
    name: HardDeckAvoidance
    children:
      - type: Condition
        name: BelowHardDeck
        params:
          threshold_ft: 1500
      - type: Action
        name: ClimbTo
        params:
          target_altitude_ft: 3500

  # ═══════════════════════════════════════════════════════════════
  # 2. Gun WEZ 조건 충족 시 즉시 사격 (승리 조건)
  # ═══════════════════════════════════════════════════════════════
  - type: Sequence
    name: GunAttackSequence
    children:
      - type: Condition
        name: DistanceBelow
        params:
          threshold_ft: 3000
      - type: Condition
        name: DistanceAbove
        params:
          threshold_ft: 500
      - type: Condition
        name: ATABelow
        params:
          threshold_deg: 12
      - type: Action
        name: GunAttack

  # ═══════════════════════════════════════════════════════════════
  # 3. DBFM: 방어 상황 — 위협 수준별 3차원 이탈 기동
  #
  # ⚠️ 설계 원칙:
  #   - SpiralDive(도주)는 근거리(< 6562ft)에서만 허용
  #     → 원거리에서 계속 도주하면 교전 범위(~20000ft) 이탈로 무승부
  #   - 도주 후에는 LeadPursuit로 즉시 재추격하여 거리 유지
  # ═══════════════════════════════════════════════════════════════
  - type: Sequence
    name: DefensiveBFM
    children:
      - type: Condition
        name: IsDefensiveSituation
      - type: Selector
        name: DefensiveOptions
        children:

          # 3-1. 심각한 위협 (AA > 130°) + 근거리 — SplitS: 배면 급하강으로 속도↑ + 이탈
          # [TimedAction] memory: true 필수 — 10 tick(2s) 동안 RUNNING 유지
          - type: Sequence
            name: SplitS_Escape
            params:
              memory: true
            children:
              - type: Condition
                name: UnderThreat
                params:
                  aa_threshold_deg: 130.0
              - type: Condition
                name: DistanceBelow
                params:
                  threshold_ft: 6562      # 2000m 이내에서만 SplitS
              - type: Action
                name: SplitS
                params:
                  duration_steps: 10

          # 3-2. 중간 위협 (AA > 90°) + 근거리 — SpiralDive: 나선형 급강하로 추격 이탈
          # ⚠️ 거리 조건 필수: 원거리 도주 시 교전 범위 이탈
          # [BaseAction] 매 tick SUCCESS 반환 — memory: true 불필요
          - type: Sequence
            name: SpiralDive_Escape
            children:
              - type: Condition
                name: UnderThreat
                params:
                  aa_threshold_deg: 90.0
              - type: Condition
                name: DistanceBelow
                params:
                  threshold_ft: 6562      # 2000m 이내에서만 SpiralDive
              - type: Action
                name: SpiralDive

          # 3-3. 위협이 있지만 이미 원거리 — LeadPursuit로 반격(거리 회복)
          - type: Sequence
            name: CounterAttack
            children:
              - type: Condition
                name: UnderThreat
                params:
                  aa_threshold_deg: 90.0
              - type: Action
                name: LeadPursuit

          # 3-4. 기본 방어 — Break Turn (최후 수단)
          - type: Action
            name: BreakTurn

  # ═══════════════════════════════════════════════════════════════
  # 4. OBFM: 공격 상황 — 위치/에너지 우위 확보 후 공격
  # ═══════════════════════════════════════════════════════════════
  - type: Sequence
    name: OffensiveBFM
    children:
      - type: Condition
        name: IsOffensiveSituation
      - type: Selector
        name: OffensiveOptions
        children:

          # 4-1. 근거리 (< 1500m) — WEZ 직전, Lead Pursuit로 정밀 추적
          - type: Sequence
            name: CloseAttack
            children:
              - type: Condition
                name: DistanceBelow
                params:
                  threshold_ft: 4921
              - type: Action
                name: LeadPursuit

          # 4-2. 적이 측면/후방 (ATA > 60°) + 중거리 — ImmelmannTurn: 상승 반전으로 방향 전환
          # [TimedAction] memory: true 필수 — 12 tick(2.4s) 동안 RUNNING 유지
          # 결과: 진행 방향 180° 전환 + 고도↑ + 속도↓
          - type: Sequence
            name: ImmelmannReengagement
            params:
              memory: true
            children:
              - type: Condition
                name: ATAAbove
                params:
                  threshold_deg: 60
              - type: Condition
                name: DistanceBelow
                params:
                  threshold_ft: 13123     # 4000m 이내에서만 ImmelmannTurn
              - type: Action
                name: ImmelmannTurn
                params:
                  duration_steps: 12

          # 4-3. 원거리 (> 3000m) — HammerHead: 수직 상승 후 방향 급전환, 재진입
          # [TimedAction] memory: true 필수 — 15 tick(3s) 동안 RUNNING 유지
          # 결과: 급격한 방향 전환 + 고도↑→하강 복귀
          - type: Sequence
            name: HammerHeadReengagement
            params:
              memory: true
            children:
              - type: Condition
                name: DistanceAbove
                params:
                  threshold_ft: 9843
              - type: Action
                name: HammerHead
                params:
                  duration_steps: 15

          # 4-4. 기본 공격 fallback
          - type: Action
            name: LagPursuit

  # ═══════════════════════════════════════════════════════════════
  # 5. HABFM: 중립 상황 — 에너지/위치 우위 선점
  # ═══════════════════════════════════════════════════════════════
  - type: Sequence
    name: NeutralBFM
    children:
      - type: Condition
        name: IsNeutralSituation
      - type: Selector
        name: NeutralOptions
        children:

          # 5-1. 근거리 대치 (< 2000m) + 높은 ATA — Loop: 수직 원형 기동
          # [TimedAction] memory: true 필수 — 15 tick(3s) 동안 RUNNING 유지
          # ⚠️ 거리 조건 강화(기존 8202ft→6562ft): Loop 중 직진으로 거리 벌어짐 방지
          - type: Sequence
            name: LoopManeuver
            params:
              memory: true
            children:
              - type: Condition
                name: DistanceBelow
                params:
                  threshold_ft: 6562      # 2000m 이내 (기존 8202ft에서 강화)
              - type: Condition
                name: ATAAbove
                params:
                  threshold_deg: 60       # ATA > 60° (기존 45°에서 강화)
              - type: Action
                name: Loop
                params:
                  duration_steps: 15

          # 5-2. 원거리 대치 (> 2500m) — SpiralClimb: 나선형 상승으로 고도 우위 확보
          # [BaseAction] 매 tick SUCCESS 반환 — 조건 지속 시 자연히 연속 실행
          - type: Sequence
            name: SpiralClimbAdvantage
            children:
              - type: Condition
                name: DistanceAbove
                params:
                  threshold_ft: 8202
              - type: Action
                name: SpiralClimb

          # 5-3. 기본 — SliceTurn: 에너지 손실 최소 방향 전환
          # [BaseAction] 매 tick SUCCESS 반환
          - type: Action
            name: SliceTurn

  # ═══════════════════════════════════════════════════════════════
  # 6. 기본 추적 (상황 판단 불가 시 최후 fallback)
  # ═══════════════════════════════════════════════════════════════
  - type: Action
    name: Pursue
